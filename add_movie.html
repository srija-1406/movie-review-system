{% extends 'base.html' %}
{% block title %}Add Movie — CineReview{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:700px">
  <h2 class="page-title mb-4">Add New Movie</h2>
  <form method="POST" class="auth-box p-4">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Movie Title *</label>
        <input type="text" name="title" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Release Year *</label>
        <input type="number" name="release_year" class="form-control" min="1900" max="2030" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Duration (minutes)</label>
        <input type="number" name="duration_min" class="form-control" min="1">
      </div>
      <div class="col-md-6">
        <label class="form-label">Language</label>
        <input type="text" name="language" class="form-control" placeholder="e.g. English">
      </div>
      <div class="col-md-6">
        <label class="form-label">Director</label>
        <select name="director_id" class="form-select">
          <option value="">— Select Director —</option>
          {% for d in directors %}
            <option value="{{ d.director_id }}">{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
      </div>
      <div class="col-12">
        <label class="form-label">Genres</label>
        <div class="d-flex flex-wrap gap-2">
          {% for g in genres %}
          <div class="form-check">
            <input type="checkbox" name="genres" value="{{ g.genre_id }}"
                   id="g{{ g.genre_id }}" class="form-check-input">
            <label class="form-check-label" for="g{{ g.genre_id }}">{{ g.genre_name }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-12 mt-2">
        <button type="submit" class="btn btn-accent px-5">Add Movie</button>
        <a href="{{ url_for('movies') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
