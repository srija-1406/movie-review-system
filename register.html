{% extends 'base.html' %}
{% block title %}Register — CineReview{% endblock %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="auth-box">
    <h2 class="auth-title mb-4">Create Account</h2>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Your name">
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password <small class="text-muted">(min 6 chars)</small></label>
        <input type="password" name="password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-accent w-100 py-2">Create Account</button>
    </form>
    <p class="text-center mt-3 text-muted">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
  </div>
</div>
{% endblock %}
